<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taran Trio — Cover Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@100;200;300;400;500&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #eee; font-family: sans-serif; display: flex; min-height: 100vh; }
  #panel { width: 300px; min-width: 300px; background: #1a1a1a; padding: 24px 18px; overflow-y: auto; border-right: 1px solid #2a2a2a; }
  #panel h1 { font-size: 11px; letter-spacing: 0.18em; color: #C4952A; margin-bottom: 22px; text-transform: uppercase; }
  .section { margin-bottom: 20px; }
  .section-title { font-size: 9px; letter-spacing: 0.22em; color: #555; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #252525; }
  .ctrl { margin-bottom: 12px; }
  .ctrl label { display: flex; justify-content: space-between; font-size: 11px; color: #999; margin-bottom: 4px; }
  .ctrl label span { color: #C4952A; font-weight: 600; }
  input[type=range] { width: 100%; accent-color: #C4952A; cursor: pointer; }
  select { width: 100%; background: #222; border: 1px solid #333; color: #eee; padding: 6px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; }
  input[type=color] { width: 44px; height: 26px; border: 1px solid #333; background: none; cursor: pointer; border-radius: 3px; padding: 2px; }
  .color-row { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #999; }
  .btn { width: 100%; padding: 10px; background: #C4952A; color: #000; border: none; border-radius: 3px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700; margin-top: 6px; }
  .btn:hover { background: #d4a53a; }
  .btn-sec { background: #252525; color: #888; }
  .btn-sec:hover { background: #2e2e2e; color: #ccc; }
  #preview-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px; background: #0d0d0d; }
  #canvas-wrap { max-width: min(680px, 100%); width: 100%; }
  canvas { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div id="panel">
  <h1>Cover Editor — Taran Trio</h1>

  <div class="section">
    <div class="section-title">Font</div>
    <div class="ctrl">
      <label>Family</label>
      <select id="fontFamily">
        <option value="Jost" selected>Jost</option>
        <option value="Syncopate">Syncopate</option>
      </select>
    </div>
    <div class="ctrl">
      <label>Weight <span id="weightVal">300</span></label>
      <input type="range" id="fontWeight" min="100" max="500" step="100" value="300">
    </div>
    <div class="ctrl">
      <label>Letter spacing <span id="spacingVal">0.05</span>em</label>
      <input type="range" id="letterSpacing" min="-0.05" max="0.5" step="0.01" value="0.05">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Size & Shape</div>
    <div class="ctrl">
      <label>Font size <span id="sizeVal">100</span>px</label>
      <input type="range" id="fontSize" min="40" max="220" step="2" value="100">
    </div>
    <div class="ctrl">
      <label>Horizontal stretch <span id="scaleXVal">118</span>%</label>
      <input type="range" id="scaleX" min="70" max="180" step="1" value="118">
    </div>
    <div class="ctrl">
      <label>Vertical squeeze <span id="scaleYVal">75</span>%</label>
      <input type="range" id="scaleY" min="40" max="130" step="1" value="75">
    </div>
    <div class="ctrl">
      <label>Line gap <span id="gapVal">10</span>px</label>
      <input type="range" id="lineGap" min="-20" max="80" step="1" value="10">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Position</div>
    <div class="ctrl">
      <label>Left margin <span id="marginLeftVal">8</span>%</label>
      <input type="range" id="marginLeft" min="0" max="50" step="0.5" value="8">
    </div>
    <div class="ctrl">
      <label>Bottom margin <span id="marginBottomVal">4</span>%</label>
      <input type="range" id="marginBottom" min="0" max="40" step="0.5" value="4">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Color</div>
    <div class="color-row">
      <input type="color" id="colorPicker" value="#C4952A">
      <span>Text color</span>
    </div>
  </div>

  <div class="section">
    <button class="btn" onclick="downloadJPG()">&#8595; Download JPG</button>
    <button class="btn btn-sec" onclick="resetDefaults()">Reset defaults</button>
  </div>
</div>

<div id="preview-area">
  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
  </div>
</div>

const img = new Image();
img.src = IMG_SRC;

const cv = document.getElementById('cv');

const ids = ['fontFamily','fontWeight','letterSpacing','fontSize','scaleX','scaleY','lineGap','marginLeft','marginBottom','colorPicker'];
const C = {};
ids.forEach(id => C[id] = document.getElementById(id));

const labels = {
  fontWeight: 'weightVal', letterSpacing: 'spacingVal', fontSize: 'sizeVal',
  scaleX: 'scaleXVal', scaleY: 'scaleYVal', lineGap: 'gapVal',
  marginLeft: 'marginLeftVal', marginBottom: 'marginBottomVal'
};

function getP() {
  return {
    family:   C.fontFamily.value,
    weight:   parseInt(C.fontWeight.value),
    spacing:  parseFloat(C.letterSpacing.value),
    size:     parseInt(C.fontSize.value),
    sx:       parseInt(C.scaleX.value) / 100,
    sy:       parseInt(C.scaleY.value) / 100,
    gap:      parseInt(C.lineGap.value),
    ml:       parseFloat(C.marginLeft.value) / 100,
    mb:       parseFloat(C.marginBottom.value) / 100,
    color:    C.colorPicker.value,
  };
}

function updateLabels() {
  Object.entries(labels).forEach(([ctrl, labelId]) => {
    const el = document.getElementById(labelId);
    if (!el) return;
    let v = C[ctrl].value;
    if (ctrl === 'letterSpacing') v = parseFloat(v).toFixed(2);
    el.textContent = v;
  });
}

function drawCover(targetCanvas) {
  const p = getP();
  const iw = img.naturalWidth, ih = img.naturalHeight;
  targetCanvas.width = iw;
  targetCanvas.height = ih;
  const ctx = targetCanvas.getContext('2d');
  ctx.drawImage(img, 0, 0, iw, ih);

  const lines = ['TARAN', 'TRIO'];
  const lineH = p.size * p.sy;
  const totalH = lineH * 2 + p.gap;
  const x = iw * p.ml;
  const y = ih - ih * p.mb - totalH;

  lines.forEach((line, i) => {
    const yPos = y + i * (lineH + p.gap);
    ctx.save();
    ctx.translate(x, yPos);
    ctx.scale(p.sx, p.sy);
    ctx.font = p.weight + " " + p.size + "px '" + p.family + "'";
    ctx.fillStyle = p.color;
    ctx.letterSpacing = p.spacing + "em";
    ctx.fillText(line, 0, p.size * 0.85);
    ctx.restore();
  });
}

function render() {
  if (!img.complete || !img.naturalWidth) return;
  drawCover(cv);
}

function downloadJPG() {
  const off = document.createElement('canvas');
  drawCover(off);
  off.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'taran_trio_cover.jpg';
    a.click();
  }, 'image/jpeg', 0.95);
}

function resetDefaults() {
  C.fontFamily.value = 'Jost';
  C.fontWeight.value = 300;
  C.letterSpacing.value = 0.05;
  C.fontSize.value = 100;
  C.scaleX.value = 118;
  C.scaleY.value = 75;
  C.lineGap.value = 10;
  C.marginLeft.value = 8;
  C.marginBottom.value = 4;
  C.colorPicker.value = '#C4952A';
  updateLabels();
  render();
}

ids.forEach(id => C[id].addEventListener('input', () => { updateLabels(); render(); }));
img.onload = () => { updateLabels(); render(); };
if (img.complete) { updateLabels(); render(); }
</script>
