<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Water — Cover Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@100;200;300;400;500&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #eee; font-family: sans-serif; display: flex; min-height: 100vh; }
  #panel { width: 300px; min-width: 300px; background: #1a1a1a; padding: 24px 18px; overflow-y: auto; border-right: 1px solid #2a2a2a; }
  #panel h1 { font-size: 11px; letter-spacing: 0.18em; color: #C4952A; margin-bottom: 22px; text-transform: uppercase; }
  .section { margin-bottom: 20px; }
  .section-title { font-size: 9px; letter-spacing: 0.22em; color: #555; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #252525; }
  .ctrl { margin-bottom: 12px; }
  .ctrl label { display: flex; justify-content: space-between; font-size: 11px; color: #999; margin-bottom: 4px; }
  .ctrl label span { color: #C4952A; font-weight: 600; }
  input[type=range] { width: 100%; accent-color: #C4952A; cursor: pointer; }
  select { width: 100%; background: #222; border: 1px solid #333; color: #eee; padding: 6px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; }
  input[type=color] { width: 44px; height: 26px; border: 1px solid #333; background: none; cursor: pointer; border-radius: 3px; padding: 2px; }
  .color-row { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #999; margin-bottom: 8px; }
  .btn { width: 100%; padding: 10px; background: #C4952A; color: #000; border: none; border-radius: 3px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700; margin-top: 6px; }
  .btn:hover { background: #d4a53a; }
  .btn-sec { background: #252525; color: #888; }
  .btn-sec:hover { background: #2e2e2e; color: #ccc; }
  #preview-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px; background: #0d0d0d; }
  #canvas-wrap { max-width: min(680px, 100%); width: 100%; }
  canvas { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div id="panel">
  <h1>Cover Editor — Silent Water</h1>

  <div class="section">
    <div class="section-title">Line 1 — Artist name</div>
    <div class="ctrl">
      <label>Font</label>
      <select id="font1">
        <option value="Syncopate" selected>Syncopate</option>
        <option value="Jost">Jost</option>
      </select>
    </div>
    <div class="ctrl">
      <label>Weight <span id="w1val">400</span></label>
      <input type="range" id="weight1" min="100" max="700" step="100" value="400">
    </div>
    <div class="ctrl">
      <label>Size <span id="s1val">52</span>px</label>
      <input type="range" id="size1" min="20" max="200" step="2" value="52">
    </div>
    <div class="ctrl">
      <label>Letter spacing <span id="ls1val">0.10</span>em</label>
      <input type="range" id="ls1" min="-0.05" max="0.5" step="0.01" value="0.10">
    </div>
    <div class="ctrl">
      <label>Horiz. stretch <span id="sx1val">100</span>%</label>
      <input type="range" id="sx1" min="70" max="180" step="1" value="100">
    </div>
    <div class="ctrl">
      <label>Vert. squeeze <span id="sy1val">100</span>%</label>
      <input type="range" id="sy1" min="40" max="130" step="1" value="100">
    </div>
    <div class="color-row">
      <input type="color" id="color1" value="#ffffff">
      <span>Color</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Line 2 — Album title</div>
    <div class="ctrl">
      <label>Font</label>
      <select id="font2">
        <option value="Jost" selected>Jost</option>
        <option value="Syncopate">Syncopate</option>
      </select>
    </div>
    <div class="ctrl">
      <label>Weight <span id="w2val">300</span></label>
      <input type="range" id="weight2" min="100" max="700" step="100" value="300">
    </div>
    <div class="ctrl">
      <label>Size <span id="s2val">68</span>px</label>
      <input type="range" id="size2" min="20" max="200" step="2" value="68">
    </div>
    <div class="ctrl">
      <label>Letter spacing <span id="ls2val">0.05</span>em</label>
      <input type="range" id="ls2" min="-0.05" max="0.5" step="0.01" value="0.05">
    </div>
    <div class="ctrl">
      <label>Horiz. stretch <span id="sx2val">118</span>%</label>
      <input type="range" id="sx2" min="70" max="180" step="1" value="118">
    </div>
    <div class="ctrl">
      <label>Vert. squeeze <span id="sy2val">75</span>%</label>
      <input type="range" id="sy2" min="40" max="130" step="1" value="75">
    </div>
    <div class="color-row">
      <input type="color" id="color2" value="#C4952A">
      <span>Color</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Position</div>
    <div class="ctrl">
      <label>Left margin <span id="mlval">8</span>%</label>
      <input type="range" id="marginLeft" min="0" max="60" step="0.5" value="8">
    </div>
    <div class="ctrl">
      <label>Vertical position <span id="topval">43</span>%</label>
      <input type="range" id="topPos" min="0" max="90" step="0.5" value="43">
    </div>
    <div class="ctrl">
      <label>Gap between lines <span id="gapval">12</span>px</label>
      <input type="range" id="lineGap" min="-10" max="80" step="1" value="12">
    </div>
  </div>

  <div class="section">
    <button class="btn" onclick="downloadJPG()">&#8595; Download JPG</button>
    <button class="btn btn-sec" onclick="resetDefaults()">Reset defaults</button>
  </div>
</div>

<div id="preview-area">
  <div id="canvas-wrap">
    <canvas id="cv"></canvas>
  </div>
</div>

const img = new Image();
img.src = IMG_SRC;
const cv = document.getElementById('cv');

const labelMap = {
  weight1:'w1val', size1:'s1val', ls1:'ls1val', sx1:'sx1val', sy1:'sy1val',
  weight2:'w2val', size2:'s2val', ls2:'ls2val', sx2:'sx2val', sy2:'sy2val',
  marginLeft:'mlval', topPos:'topval', lineGap:'gapval'
};

function g(id) { return document.getElementById(id); }

function updateLabels() {
  Object.entries(labelMap).forEach(([ctrl, lbl]) => {
    const el = g(lbl); if (!el) return;
    let v = g(ctrl).value;
    if (ctrl==='ls1'||ctrl==='ls2') v = parseFloat(v).toFixed(2);
    el.textContent = v;
  });
}

function getP() {
  return {
    font1:g('font1').value, w1:parseInt(g('weight1').value), s1:parseInt(g('size1').value),
    ls1:parseFloat(g('ls1').value), sx1:parseInt(g('sx1').value)/100, sy1:parseInt(g('sy1').value)/100, c1:g('color1').value,
    font2:g('font2').value, w2:parseInt(g('weight2').value), s2:parseInt(g('size2').value),
    ls2:parseFloat(g('ls2').value), sx2:parseInt(g('sx2').value)/100, sy2:parseInt(g('sy2').value)/100, c2:g('color2').value,
    ml:parseFloat(g('marginLeft').value)/100, top:parseFloat(g('topPos').value)/100, gap:parseInt(g('lineGap').value),
  };
}

function drawLine(ctx, text, x, y, font, weight, size, ls, sx, sy, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(sx, sy);
  ctx.font = weight + " " + size + "px '" + font + "'";
  ctx.fillStyle = color;
  ctx.letterSpacing = ls + "em";
  ctx.fillText(text, 0, size * 0.85);
  ctx.restore();
}

function drawCover(target) {
  const p = getP();
  const iw = img.naturalWidth, ih = img.naturalHeight;
  target.width = iw; target.height = ih;
  const ctx = target.getContext('2d');
  ctx.drawImage(img, 0, 0, iw, ih);
  const x = iw * p.ml;
  const y1 = ih * p.top;
  const line1H = p.s1 * p.sy1;
  const y2 = y1 + line1H + p.gap;
  drawLine(ctx, 'ANATOLI TARAN', x, y1, p.font1, p.w1, p.s1, p.ls1, p.sx1, p.sy1, p.c1);
  drawLine(ctx, 'SILENT WATER',  x, y2, p.font2, p.w2, p.s2, p.ls2, p.sx2, p.sy2, p.c2);
}

function render() { if (!img.complete||!img.naturalWidth) return; drawCover(cv); }

function downloadJPG() {
  const off = document.createElement('canvas');
  drawCover(off);
  off.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'silent_water_cover.jpg';
    a.click();
  }, 'image/jpeg', 0.95);
}

function resetDefaults() {
  g('font1').value='Syncopate'; g('weight1').value=400; g('size1').value=52; g('ls1').value=0.10; g('sx1').value=100; g('sy1').value=100; g('color1').value='#ffffff';
  g('font2').value='Jost'; g('weight2').value=300; g('size2').value=68; g('ls2').value=0.05; g('sx2').value=118; g('sy2').value=75; g('color2').value='#C4952A';
  g('marginLeft').value=8; g('topPos').value=43; g('lineGap').value=12;
  updateLabels(); render();
}

document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', () => { updateLabels(); render(); }));
img.onload = () => { updateLabels(); render(); };
if (img.complete) { updateLabels(); render(); }
</script>
</body>
</html>
